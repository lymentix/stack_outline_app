{% extends "base.html" %}

{% block title %}{% if game %}Edit {{ game.title }}{% else %}Add Game{% endif %} | Game Library Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-header fw-semibold">
        {% if game %}Edit Game{% else %}Add New Game{% endif %}
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="title" name="title"
                   value="{{ vals.get('title', '') }}" required maxlength="150">
          </div>

          <div class="mb-3">
            <label for="genre" class="form-label">Genre</label>
            <input type="text" class="form-control" id="genre" name="genre"
                   value="{{ vals.get('genre', '') }}" maxlength="50">
          </div>

          <div class="mb-3">
            <label for="release_date" class="form-label">Release Date <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="release_date" name="release_date"
                   value="{{ vals.get('release_date', '') }}" required>
          </div>

          <div class="mb-3">
            <label for="price" class="form-label">Price ($)</label>
            <input type="number" step="0.01" min="0" class="form-control" id="price" name="price"
                   value="{{ vals.get('price', '') }}">
          </div>

          <div class="mb-4">
            <label for="publisher_id" class="form-label">Publisher</label>
            <select class="form-select" id="publisher_id" name="publisher_id">
              <option value="">— None —</option>
              {% for pub in publishers %}
                <option value="{{ pub.publisher_id }}"
                  {% if vals.get('publisher_id', '')|string == pub.publisher_id|string %}selected{% endif %}>
                  {{ pub.name }}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              {% if game %}Save Changes{% else %}Add Game{% endif %}
            </button>
            <a href="{{ url_for('main.games_index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
