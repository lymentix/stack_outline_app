{% extends "base.html" %}

{% block title %}{% if player %}Edit {{ player.username }}{% else %}Add Player{% endif %} | Game Library Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header fw-semibold">
        {% if player %}Edit Player{% else %}Add New Player{% endif %}
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="username" name="username"
                   value="{{ vals.get('username', '') }}" required maxlength="50">
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
            <input type="email" class="form-control" id="email" name="email"
                   value="{{ vals.get('email', '') }}" required maxlength="100">
          </div>

          <div class="mb-4">
            <label for="join_date" class="form-label">Join Date</label>
            <input type="date" class="form-control" id="join_date" name="join_date"
                   value="{{ vals.get('join_date', '') }}">
            <div class="form-text">Defaults to today if left blank.</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
              {% if player %}Save Changes{% else %}Add Player{% endif %}
            </button>
            <a href="{{ url_for('main.players_index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
